version: "3.9"

services:
  mmf:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mmf-platform
    ports:
      - "${PORT:-5000}:5000"
    environment:
      - PORT=5000
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - RATE_LIMIT=${RATE_LIMIT:-20 per minute}
      - MAX_CONTENT_LENGTH=${MAX_CONTENT_LENGTH:-10485760}
    volumes:
      - mmf_data:/app/mmf_dev
      - mmf_backups:/app/mmf_dev/backups
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  mmf_data:
    driver: local
  mmf_backups:
    driver: local
